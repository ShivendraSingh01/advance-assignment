app:
  name: churn-app
  language: python
  docker_image: yourdockerhub/churn-app

quality:
  coverage_report: reports/coverage.xml
  junit_report: reports/junit/pytest.xml
  sonar_project_key: churn-app

environments:
  dev:
    namespace: churn-dev
    approval_required: false
    replicas: 1
  qa:
    namespace: churn-qa
    approval_required: true
    replicas: 1
  prod:
    namespace: churn-prod
    approval_required: true
    replicas: 2

deployment_strategies:
  - rolling
  - blue-green
  - canary
