apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-app
  namespace: churn-prod
  labels:
    app: churn-app
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-app
  template:
    metadata:
      labels:
        app: churn-app
        environment: prod
    spec:
      containers:
        - name: churn-app
          image: yourdockerhub/churn-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
